services:
  pgsql:
    image: postgres:16-alpine
    container_name: house-visits-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: house_visits
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data

volumes:
  pgsql_data: